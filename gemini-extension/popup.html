<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --primary: #8e2de2;
      --secondary: #4a00e0;
      --bg: #0f0c20;
      --card: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
      --text-muted: #a0aec0;
      --success: #10b981;
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
      color: var(--text);
      width: 320px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      box-shadow: 0 0 12px var(--primary);
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ffffff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(10px);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-label {
      color: var(--text-muted);
      font-size: 13px;
    }

    .status-value {
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .badge.connected {
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .badge.disconnected {
      background-color: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    .btn-sync {
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(142, 45, 226, 0.3);
    }

    .btn-sync:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(142, 45, 226, 0.55);
    }

    .btn-sync:active {
      transform: translateY(1px);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icon.png" class="logo-img">
      <h2>Gemini Api Agent</h2>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Server Connection</span>
        <span class="status-value" id="conn-status">
          <span class="badge disconnected" id="status-badge"></span>
          <span id="status-text">Disconnected</span>
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Last Sync</span>
        <span class="status-value" id="last-sync" style="color: var(--text-muted);">Never</span>
      </div>
    </div>

    <button class="btn-sync" id="sync-btn">Force Sync Cookies</button>

  </div>
  <script src="popup.js"></script>
</body>
</html>
